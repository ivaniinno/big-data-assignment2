services:
  cluster-master:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-master
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
      - "9000:9000"
      - "9870:9870"
    volumes:
      - "./app:/app"
    networks:
      - spark-cluster
    depends_on:
      cluster-slave-1:
        condition: service_healthy
      cassandra-server:
        condition: service_healthy
    hostname: cluster-master
    tty: true
    working_dir: /app
    # You can comment the entrypoint to run the script manually inside the container
    entrypoint: 
      - bash
      - /app/app.sh
    
  cluster-slave-1:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-slave-1
    networks:
      - spark-cluster
    hostname: cluster-slave-1
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sshd >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  # cluster-slave-2:
  #   image: firasj/spark-docker-cluster
  #   container_name: cluster-slave-2
  #   networks:
  #     - spark-cluster
  #   depends_on:
  #     - cluster-slave-1
  #   hostname: cluster-slave-2
  #   tty: true
  cassandra-server:
    image: cassandra
    container_name: cassandra-server
    networks:
      - spark-cluster
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    

networks:
  spark-cluster:
    driver: bridge
